name: Propagate Schema Update

on:
  repository_dispatch:
    types: [schema-published]

jobs:
  update-consumers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - DecisionGuideAI
          - olumi-assistants-service
          - plot-lite-service

    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          repository: Talchain/${{ matrix.repo }}
          token: ${{ secrets.OLUMI_SCHEMAS_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - name: Update schema version
        run: npm install @talchain/schemas@${{ github.event.client_payload.version }} --save-exact
        env:
          NODE_AUTH_TOKEN: ${{ secrets.OLUMI_SCHEMAS_PAT }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.OLUMI_SCHEMAS_PAT }}
          commit-message: "chore: bump @talchain/schemas to ${{ github.event.client_payload.version }}"
          branch: "chore/schemas-${{ github.event.client_payload.version }}"
          title: "chore: bump @talchain/schemas to ${{ github.event.client_payload.version }}"
          body: |
            Bumps `@talchain/schemas` to `${{ github.event.client_payload.version }}`.

            See [release notes](https://github.com/Talchain/olumi-schemas/releases/tag/v${{ github.event.client_payload.version }}).
          labels: dependencies,schemas
